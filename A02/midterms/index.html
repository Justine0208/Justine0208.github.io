<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rick and Morty Multiverse</title>

<link href="https://fonts.googleapis.com/css2?family=Creepster&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  background:#0b0c10;
  color:#66fcf1;
  font-family:'Creepster', cursive;
}

/* HERO */
.hero{
  height:90vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  background: radial-gradient(circle, rgba(102,252,241,0.2), #0b0c10),
  url('https://wallpaperaccess.com/full/83128.jpg') center/cover;
  animation: portal 6s infinite linear;
}

@keyframes portal{
  0%{filter:hue-rotate(0deg);}
  100%{filter:hue-rotate(360deg);}
}

.btn-theme{
  background:#66fcf1;
  color:#0b0c10;
  font-weight:bold;
}

/* CARDS */
.card:hover{
  transform:scale(1.05);
  transition:0.3s;
}

.portal-border{
  border:2px solid #66fcf1;
}

/* PAGES */
.page{display:none;}
.active{display:block;}

.center{
  display:flex;
  justify-content:center;
  align-items:center;
  height:70vh;
}
</style>
</head>

<body>

<!-- NAV -->
<nav class="navbar navbar-dark bg-dark px-3">
  <a class="navbar-brand" href="#" onclick="showPage('home')">Rick & Morty Multiverse</a>
  <div>
    <button class="btn btn-sm btn-outline-info" onclick="showPage('home')">Home</button>
    <button class="btn btn-sm btn-outline-info" onclick="showPage('characters')">Characters</button>
  </div>
</nav>

<!-- HOME -->
<div id="home" class="page active">

<section class="hero">
  <div>
    <h1 class="display-2">WELCOME</h1>
    <p>Rick & Morty Multiverse Explorer</p>
    <button class="btn btn-theme btn-lg" onclick="showPage('characters')">
      Enter Portal
    </button>
  </div>
</section>

</div>

<!-- CHARACTERS -->
<div id="characters" class="page container py-4">

<h1>Characters</h1>

<input id="search" class="form-control mb-3" placeholder="Search character...">

<div class="d-flex justify-content-between mb-3">
  <button class="btn btn-info" onclick="prevPage()">Prev</button>
  <button class="btn btn-info" onclick="nextPage()">Next</button>
</div>

<div id="loading">Loading...</div>
<div class="row" id="characterList"></div>

</div>

<!-- DETAILS -->
<div id="details" class="page container py-4">
  <div id="detailBox" class="center">Loading...</div>
</div>

<script>

let page = 1;
let allCharacters = [];

/* PAGE SWITCH */
function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  if(id === "characters") loadCharacters();
}

/* LOAD API */
function loadCharacters(){
  document.getElementById("loading").style.display="block";

  fetch(`https://rickandmortyapi.com/api/character?page=${page}`)
  .then(res=>res.json())
  .then(data=>{
    document.getElementById("loading").style.display="none";
    allCharacters = data.results || [];
    render(allCharacters);
  })
  .catch(()=>{
    document.getElementById("loading").innerHTML="Failed to load API";
  });
}

/* RENDER LIST */
function render(chars){
  let box = document.getElementById("characterList");
  box.innerHTML="";

  chars.forEach(c=>{
    box.innerHTML += `
      <div class="col-md-3 mb-3">
        <div class="card bg-dark text-light p-2 portal-border">

          <img src="${c.image}" class="img-fluid">

          <h5>${c.name}</h5>
          <p>${c.species}</p>

          <button class="btn btn-info btn-sm"
            onclick="viewCharacter(${c.id})">
            View Info
          </button>

        </div>
      </div>
    `;
  });
}

/* SEARCH */
document.getElementById("search").addEventListener("input", e=>{
  render(allCharacters.filter(c=>
    c.name.toLowerCase().includes(e.target.value.toLowerCase())
  ));
});

/* PAGINATION */
function nextPage(){
  page++;
  loadCharacters();
}

function prevPage(){
  if(page>1){
    page--;
    loadCharacters();
  }
}

/* VIEW DETAILS (SMALL CARD FIXED) */
function viewCharacter(id){
  showPage("details");

  document.getElementById("detailBox").innerHTML="Loading...";

  fetch(`https://rickandmortyapi.com/api/character/${id}`)
  .then(res=>res.json())
  .then(c=>{

    document.getElementById("detailBox").innerHTML = `
      
      <div class="d-flex justify-content-center align-items-center" style="min-height:80vh;">

        <div class="card bg-dark text-light portal-border shadow"
             style="max-width:260px;width:100%;border-radius:12px;padding:10px;">

          <img src="${c.image}" class="img-fluid mb-2 rounded">

          <h4 class="text-center">${c.name}</h4>

          <p class="mb-1"><b>Status:</b> ${c.status}</p>
          <p class="mb-1"><b>Species:</b> ${c.species}</p>
          <p class="mb-1"><b>Gender:</b> ${c.gender}</p>
          <p class="mb-1"><b>Origin:</b> ${c.origin.name}</p>
          <p class="mb-2"><b>Location:</b> ${c.location.name}</p>

          <button class="btn btn-info btn-sm w-100"
            onclick="showPage('characters')">
            Back
          </button>

        </div>

      </div>

    `;
  })
  .catch(()=>{
    document.getElementById("detailBox").innerHTML="Failed to load character";
  });
}

</script>

</body>
</html>
